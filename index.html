<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مناحل السعيد | للعسل ومنتجات النحل</title>
    <!-- خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== إعدادات التصميم العامة ==================== */
        :root {
            --royal-black: #0f0f12;
            --royal-dark: #1a1a1d;
            --gold-primary: #D4AF37;
            --gold-light: #F9E29A;
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F9E29A 50%, #D4AF37 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --text-main: #ffffff;
            --text-muted: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--royal-black);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 20%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        h1, h2, h3, h4, .brand-name, .checkout-btn, .tab-btn {
            font-family: 'Amiri', serif;
        }

        /* ==================== الهيدر ==================== */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 18, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        
        .logo-container:hover { transform: scale(1.02); }

        .custom-logo {
            height: 55px;
            width: 55px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--gold-primary);
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav { display: none; }

        .cart-icon { position: relative; cursor: pointer; color: var(--gold-primary); padding: 5px; }
        .cart-icon i { font-size: 1.5rem; }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: var(--gold-primary); color: var(--royal-black);
            font-weight: bold; font-size: 0.75rem; width: 20px; height: 20px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        /* ==================== التصنيفات (Tabs) ==================== */
        .category-tabs {
            display: flex; justify-content: center; gap: 10px; margin: 20px 0;
            padding: 0 5%; overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--text-muted); padding: 10px 20px; border-radius: 25px;
            cursor: pointer; transition: all 0.3s; display: inline-flex;
            align-items: center; gap: 8px; font-size: 1rem;
        }
        .tab-btn i { font-size: 1.3rem; }
        .tab-btn:hover, .tab-btn.active { background: var(--gold-primary); color: var(--royal-black); font-weight: bold; }

        /* ==================== شبكة المنتجات ==================== */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px 20px; }

        .search-bar {
            width: 100%; max-width: 500px; margin: 0 auto 20px; position: relative;
        }
        .search-bar input {
            width: 100%; padding: 12px 50px 12px 15px; border-radius: 25px;
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.3);
            color: white; outline: none;
        }
        .search-bar input:focus { border-color: var(--gold-primary); }
        .search-bar i {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--gold-primary); font-size: 1.2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .glass-card {
            background: rgba(26, 26, 29, 0.6); border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px; overflow: hidden; transition: transform 0.3s;
        }
        .glass-card:hover { transform: translateY(-3px); border-color: var(--gold-primary); }

        .product-img-container { 
            width: 100%; height: 180px; background: #222; 
            cursor: pointer; position: relative;
            overflow: hidden;
        }
        /* تأثير تكبير عند الضغط */
        .product-img-container::after {
            content: '\f002'; /* FontAwesome Search Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: rgba(255,255,255,0.8);
            font-size: 2rem;
            transition: transform 0.3s;
        }
        .product-img-container:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }
        .product-img-container:hover .product-img {
            transform: scale(1.1);
        }

        .product-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.3s;
        }
        
        .product-info { padding: 15px; text-align: center; }
        .product-title { font-size: 1.1rem; margin-bottom: 8px; color: var(--text-main); }
        .product-price {
            color: var(--gold-primary); font-size: 1.2rem; font-weight: bold;
            margin-bottom: 10px; display: block;
        }

        .add-to-cart-btn {
            width: 100%; background: transparent; border: 1px solid var(--gold-primary);
            color: var(--gold-primary); padding: 8px; border-radius: 20px;
            cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px;
        }
        .add-to-cart-btn:hover { background: var(--gold-primary); color: var(--royal-black); }

        /* ==================== السلة والنوافذ ==================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 2000; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
            padding: 15px;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        
        /* تنسيق نافذة السلة */
        .modal-content {
            width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto;
            background: var(--royal-dark); border: 1px solid var(--gold-primary);
            border-radius: 15px; padding: 20px; position: relative;
        }

        /* تنسيق نافذة تفاصيل المنتج */
        .product-detail-content {
            width: 100%; max-width: 600px;
            background: var(--royal-dark); border: 1px solid var(--gold-primary);
            border-radius: 15px; padding: 0; position: relative;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .detail-img-wrapper {
            width: 100%;
            background: #000;
            position: relative;
        }
        .detail-img {
            width: 100%;
            height: auto;
            max-height: 50vh; /* لا يزيد عن نصف الشاشة */
            object-fit: contain;
            display: block;
        }
        .detail-info {
            padding: 20px;
            text-align: center;
        }
        .detail-title {
            font-size: 1.5rem; color: var(--text-main); margin-bottom: 10px;
        }
        .detail-price {
            font-size: 1.8rem; color: var(--gold-primary); font-weight: bold; margin-bottom: 20px;
        }
        .detail-add-btn {
            background: var(--gold-gradient); border: none; color: #000;
            padding: 12px 30px; font-size: 1.1rem; border-radius: 25px;
            cursor: pointer; font-weight: bold; width: 100%;
        }

        .close-modal {
            position: absolute; left: 15px; top: 15px; font-size: 1.8rem;
            color: #fff; cursor: pointer; z-index: 10;
            background: rgba(0,0,0,0.5); width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        
        /* زر الإغلاق لتفاصيل المنتج ليكون واضحاً على الصورة */
        .product-detail-content .close-modal {
            top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .cart-total { 
            margin-top: 20px; font-size: 1.5rem; text-align: left; color: #ffffff; 
            border-top: 1px solid var(--gold-primary);
            padding-top: 15px; font-weight: bold;
        }
        
        .checkout-form input, .checkout-form select, .checkout-form textarea {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid #444;
            color: white; border-radius: 8px;
        }
        .checkout-form option { background-color: #fff; color: #000; }
        .checkout-form datalist { z-index: 10; }

        .checkout-btn {
            width: 100%; padding: 12px; background: var(--gold-gradient); border: none;
            color: var(--royal-black); font-weight: bold; font-size: 1.1rem;
            border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        .checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ==================== Loading Spinner ==================== */
        .loader-container { display: flex; justify-content: center; align-items: center; height: 200px; }
        .loader {
            border: 4px solid rgba(212, 175, 55, 0.1); border-left-color: var(--gold-primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ==================== Toast ==================== */
        #toast {
            visibility: hidden; min-width: 200px; background: var(--gold-primary); color: #000;
            text-align: center; border-radius: 5px; padding: 12px; position: fixed; z-index: 3000;
            left: 50%; bottom: 20px; transform: translateX(-50%); font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 20px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 20px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; gap: 15px; }
            .brand-name { font-size: 1.3rem; }
            .products-grid { grid-template-columns: 1fr; }
            .category-tabs { justify-content: flex-start; padding-left: 15px; }
        }
    </style>
</head>

            "El M'Ghair": ["المغير", "جامعة", "تندلة", "سيدي خليل"],
            "El Menia": ["المنيعة", "حاسي القارة"]
        };

        // ================= تهيئة وجلب البيانات =================
        window.onload = function() {
            fetchProductsFromAPI();
            loadCartFromStorage();
        };

        // دالة جلب المنتجات (مع معالجة التصنيفات العربية)
        async function fetchProductsFromAPI() {
            const grid = document.getElementById('productsGrid');
            const loader = document.getElementById('loader');
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                products = data.map((item, index) => {
                    let imageUrl = item.image || item.img || item['صورة'] || item['Image'] || item.link;
                    if (!imageUrl || !imageUrl.startsWith('http')) {
                        imageUrl = `https://picsum.photos/seed/${index + item.name}/300/300`;
                    }

                    let cat = item.category || 'honey';
                    if (cat === 'ملابس') cat = 'clothes';
                    else if (cat === 'عسل') cat = 'honey';
                    else if (cat === 'أدوات') cat = 'tools';
                    else if (cat === 'صناديق') cat = 'boxes';
                    
                    return {
                        id: parseInt(item.id) || index, 
                        name: item.name || 'منتج بدون اسم',
                        category: cat,
                        price: parseFloat(item.price) || 0,
                        stock: parseInt(item.stock) || 0, 
                        image: imageUrl
                    };
                });

                loader.style.display = 'none';
                renderProducts(products);

            } catch (error) {
                console.error("Error fetching products:", error);
                loader.innerHTML = '<p style="color:red">حدث خطأ في جلب البيانات.</p>';
            }
        }

        // ================= وظائف العرض =================
        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            if (list.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#999; width:100%;">لا توجد منتجات في هذا التصنيف</p>';
                return;
            }
            list.forEach(p => {
                // إضافة حدث onclick لحاوية الصورة لفتح التفاصيل
                const card = `
                    <div class="glass-card">
                        <div class="product-img-container" onclick="viewProduct(${p.id})">
                            <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <span class="product-price">${p.price} ${CURRENCY}</span>
                            <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart(${p.id})">
                                <i class="fa-solid fa-cart-plus"></i> أضف للسلة
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            renderProducts(filtered);
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        // ================= عرض تفاصيل المنتج (Modal) =================
        function viewProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            currentDetailProductId = id;
            document.getElementById('detailImage').src = product.image;
            document.getElementById('detailName').innerText = product.name;
            document.getElementById('detailPrice').innerText = `${product.price} ${CURRENCY}`;
            
            // إعداد الزر ليضيف المنتج من داخل المودال
            const btn = document.getElementById('detailAddBtn');
            btn.onclick = function() {
                addToCart(id);
                closeProductDetail();
            };

            document.getElementById('productDetailModal').classList.add('open');
        }

        function closeProductDetail() {
            document.getElementById('productDetailModal').classList.remove('open');
        }

        // ================= السلة =================
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            
            if (!product) {
                return showToast("حدث خطأ، المنتج غير موجود");
            }

            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            saveCartToStorage();
            showToast("تمت الإضافة للسلة");
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((acc, item) => acc + item.qty, 0);
            const cartDiv = document.getElementById('cartItems');
            cartDiv.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartDiv.innerHTML = '<p style="text-align:center; color:#999;">السلة فارغة</p>';
            } else {
                cart.forEach((item, index) => {
                    total += item.price * item.qty;
                    cartDiv.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${item.name}</strong><br>
                                <small>${item.price} ${CURRENCY} x ${item.qty}</small>
                            </div>
                            <div>
                                <button class="action-btn" style="padding:5px 10px; background:#444; color:white; border:none; cursor:pointer;" onclick="changeQty(${index}, -1)">-</button>
                                <button class="action-btn" style="padding:5px 10px; background:#444; color:white; border:none; cursor:pointer;" onclick="changeQty(${index}, 1)">+</button>
                                <button class="action-btn delete-btn" style="padding:5px 10px;" onclick="removeFromCart(${index})"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('cartTotal').innerText = `المجموع: ${total} ${CURRENCY}`;
        }

        function changeQty(index, change) {
            cart[index].qty += change;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
            saveCartToStorage();
        }
        function removeFromCart(index) { cart.splice(index, 1); updateCartUI(); saveCartToStorage(); }
        
        function openCart() { document.getElementById('cartModal').classList.add('open'); }
        function closeCart() { document.getElementById('cartModal').classList.remove('open'); }

        // دالة تحديث قائمة البلديات
        function updateCommunes() {
            const wilayaSelect = document.getElementById('custWilaya');
            const communeInput = document.getElementById('custCommune');
            const dataList = document.getElementById('communeList');
            const selectedWilaya = wilayaSelect.value;

            dataList.innerHTML = '';
            communeInput.value = '';

            if (selectedWilaya && wilayaCommunes[selectedWilaya]) {
                wilayaCommunes[selectedWilaya].forEach(commune => {
                    const option = document.createElement('option');
                    option.value = commune;
                    dataList.appendChild(option);
                });
                communeInput.placeholder = "اختر البلدية أو اكتبها";
            } else {
                const option = document.createElement('option');
                option.value = "";
                option.textContent = "";
                dataList.appendChild(option);
                communeInput.placeholder = "البلدية (اختر الولاية أولاً)";
            }
        }

        function submitOrder(e) {
            e.preventDefault();
            if (cart.length === 0) return showToast("السلة فارغة!");

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري الإرسال...";

            // تجميع أسماء المنتجات في نص واحد
            const productsList = cart.map(item => `${item.name} (${item.qty})`).join(', ');

            const orderData = {
                nam: document.getElementById('custFirstName').value,
                prenom: document.getElementById('custLastName').value,
                telph: document.getElementById('custPhone').value,
                wilaya: document.getElementById('custWilaya').value,
                commune: document.getElementById('custCommune').value,
                prix: cart.reduce((a, b) => a + (b.price * b.qty), 0),
                // إضافة حقل المنتجات كما طُلب
                products: productsList, 
                date: new Date().toLocaleString()
            };

            fetch(ORDERS_API_URL, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                showToast("تم استلام طلبكم وسيتم التواصل معكم");
                cart = [];
                updateCartUI();
                saveCartToStorage();
                closeCart();
                document.getElementById('checkoutForm').reset();
                document.getElementById('custCommune').value = "";
                document.getElementById('custWilaya').value = "";
                document.getElementById('communeList').innerHTML = '<option value="" disabled selected>اختر الولاية أولاً</option>';
                
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال الطلب";
            })
            .catch(error => {
                console.error("Error:", error);
                showToast("فشل الاتصال بالخادم");
                submitBtn.disabled = false;
                submitBtn.innerText = "إرسال الطلب";
            });
        }

        // ================= أدوات =================
        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        }

        function saveCartToStorage() {
            localStorage.setItem('saeed_cart', JSON.stringify(cart));
        }
        function loadCartFromStorage() {
            const saved = localStorage.getItem('saeed_cart');
            if (saved) {
                cart = JSON.parse(saved);
                updateCartUI();
            }
        }
    </script>
</body>
</html>
